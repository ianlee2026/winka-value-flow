<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>전사 가치 플로우</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
    overflow-x: hidden;
  }
  .wrap { width: 100%; max-width: 960px; }
  h2 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .sub {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-bottom: 32px;
  }

  /* --- Node styles --- */
  .node-group { cursor: pointer; }
  .node-group:hover .node-card { filter: brightness(1.04); }
  .node-group:hover .node-shadow { opacity: 0.18; }

  .node-shadow {
    opacity: 0.10;
    transition: opacity 0.3s ease;
  }
  .node-card {
    transition: filter 0.3s ease;
  }
  .th { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
  .ts { font-size: 11.5px; font-weight: 400; }
  .badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* --- Flow particle animation --- */
  @keyframes flowForward {
    0%   { offset-distance: 0%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  .particle {
    offset-distance: 0%;
    animation: flowForward 2.5s linear infinite;
  }
  .particle:nth-child(2) { animation-delay: 0.8s; }
  .particle:nth-child(3) { animation-delay: 1.6s; }

  /* --- Arrow dash animation --- */
  @keyframes dashFlow {
    to { stroke-dashoffset: -20; }
  }
  .flow-line {
    stroke-dasharray: 6 4;
    animation: dashFlow 1s linear infinite;
  }
  .flow-line-rev {
    stroke-dasharray: 6 4;
    animation: dashFlow 1s linear infinite reverse;
  }

  /* --- Pulse ring on hover --- */
  @keyframes pulseRing {
    0%   { r: 0; opacity: 0.5; }
    100% { r: 45; opacity: 0; }
  }
  .pulse-ring {
    opacity: 0;
    pointer-events: none;
  }
  .node-group:hover .pulse-ring {
    animation: pulseRing 1.2s ease-out infinite;
  }

  /* --- Label style --- */
  .label-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }
  .label-bg {
    opacity: 0.92;
  }

  /* --- Legend --- */
  .legend {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: #777;
  }
  .legend-dot {
    width: 22px;
    height: 4px;
    border-radius: 2px;
  }

  /* --- Tooltip --- */
  .tooltip {
    position: fixed;
    background: #1a1a2e;
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 240px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .tooltip.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media print {
    body { padding: 0; background: white; }
    .particle, .pulse-ring { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h2>전사 가치 플로우</h2>
  <p class="sub">윈카/7플레이 · 채널 · 광고주(운영자) · 유저 — 서비스 · 데이터 · 수익 순환 구조</p>

  <svg id="diagram" width="100%" viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Gradients -->
      <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#6C63FF"/>
        <stop offset="100%" stop-color="#534AB7"/>
      </linearGradient>
      <linearGradient id="gTeal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#1DB88E"/>
        <stop offset="100%" stop-color="#0F6E56"/>
      </linearGradient>
      <linearGradient id="gCoral" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#E8724A"/>
        <stop offset="100%" stop-color="#C04A24"/>
      </linearGradient>
      <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#4A90D9"/>
        <stop offset="100%" stop-color="#185FA5"/>
      </linearGradient>

      <!-- Glow filters -->
      <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Arrow markers -->
      <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M1 1.5L8 5L1 8.5" fill="none" stroke="#1DB88E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M1 1.5L8 5L1 8.5" fill="none" stroke="#D4910F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>

      <!-- Flow paths (named for particle offset-path) -->
      <path id="p-wc" d="M 270 100 Q 168 145 155 190" fill="none"/>
      <path id="p-cw" d="M 175 190 Q 240 145 290 100" fill="none"/>
      <path id="p-wa" d="M 450 100 Q 552 145 565 190" fill="none"/>
      <path id="p-aw" d="M 545 190 Q 480 145 430 100" fill="none"/>
      <path id="p-ca" d="M 230 258 L 490 258" fill="none"/>
      <path id="p-ac" d="M 490 275 L 230 275" fill="none"/>
      <path id="p-cu" d="M 140 320 Q 125 375 240 410" fill="none"/>
      <path id="p-uc" d="M 225 410 Q 108 375 125 320" fill="none"/>
      <path id="p-au" d="M 575 320 Q 590 375 480 410" fill="none"/>
      <path id="p-ua" d="M 495 410 Q 610 375 590 320" fill="none"/>
    </defs>

    <!-- ===== FLOW LINES ===== -->
    <!-- Green = service/solution flow -->
    <path d="M 270 100 Q 168 145 155 190" fill="none" stroke="#1DB88E" stroke-width="1.8" class="flow-line" marker-end="url(#arrG)" opacity="0.7"/>
    <path d="M 450 100 Q 552 145 565 190" fill="none" stroke="#1DB88E" stroke-width="1.8" class="flow-line" marker-end="url(#arrG)" opacity="0.7"/>
    <line x1="230" y1="258" x2="490" y2="258" fill="none" stroke="#1DB88E" stroke-width="1.8" class="flow-line" marker-end="url(#arrG)" opacity="0.7"/>
    <path d="M 140 320 Q 125 375 240 410" fill="none" stroke="#1DB88E" stroke-width="1.8" class="flow-line" marker-end="url(#arrG)" opacity="0.7"/>
    <path d="M 575 320 Q 590 375 480 410" fill="none" stroke="#1DB88E" stroke-width="1.8" class="flow-line" marker-end="url(#arrG)" opacity="0.7"/>

    <!-- Amber = data/revenue flow -->
    <path d="M 175 190 Q 240 145 290 100" fill="none" stroke="#D4910F" stroke-width="1.8" class="flow-line-rev" marker-end="url(#arrA)" opacity="0.7"/>
    <path d="M 545 190 Q 480 145 430 100" fill="none" stroke="#D4910F" stroke-width="1.8" class="flow-line-rev" marker-end="url(#arrA)" opacity="0.7"/>
    <line x1="490" y1="275" x2="230" y2="275" fill="none" stroke="#D4910F" stroke-width="1.8" class="flow-line-rev" marker-end="url(#arrA)" opacity="0.7"/>
    <path d="M 225 410 Q 108 375 125 320" fill="none" stroke="#D4910F" stroke-width="1.8" class="flow-line-rev" marker-end="url(#arrA)" opacity="0.7"/>
    <path d="M 495 410 Q 610 375 590 320" fill="none" stroke="#D4910F" stroke-width="1.8" class="flow-line-rev" marker-end="url(#arrA)" opacity="0.7"/>

    <!-- ===== FLOWING PARTICLES ===== -->
    <!-- Green particles -->
    <circle r="3" fill="#1DB88E" filter="url(#glowGreen)" class="particle" style="offset-path:path('M 270 100 Q 168 145 155 190')"/>
    <circle r="3" fill="#1DB88E" filter="url(#glowGreen)" class="particle" style="offset-path:path('M 450 100 Q 552 145 565 190'); animation-delay:0.4s"/>
    <circle r="3" fill="#1DB88E" filter="url(#glowGreen)" class="particle" style="offset-path:path('M 230 258 L 490 258'); animation-delay:0.2s"/>
    <circle r="3" fill="#1DB88E" filter="url(#glowGreen)" class="particle" style="offset-path:path('M 140 320 Q 125 375 240 410'); animation-delay:0.6s"/>
    <circle r="3" fill="#1DB88E" filter="url(#glowGreen)" class="particle" style="offset-path:path('M 575 320 Q 590 375 480 410'); animation-delay:1.0s"/>

    <!-- Amber particles -->
    <circle r="3" fill="#D4910F" filter="url(#glowAmber)" class="particle" style="offset-path:path('M 175 190 Q 240 145 290 100'); animation-delay:1.2s"/>
    <circle r="3" fill="#D4910F" filter="url(#glowAmber)" class="particle" style="offset-path:path('M 545 190 Q 480 145 430 100'); animation-delay:0.5s"/>
    <circle r="3" fill="#D4910F" filter="url(#glowAmber)" class="particle" style="offset-path:path('M 490 275 L 230 275'); animation-delay:0.9s"/>
    <circle r="3" fill="#D4910F" filter="url(#glowAmber)" class="particle" style="offset-path:path('M 225 410 Q 108 375 125 320'); animation-delay:1.5s"/>
    <circle r="3" fill="#D4910F" filter="url(#glowAmber)" class="particle" style="offset-path:path('M 495 410 Q 610 375 590 320'); animation-delay:0.3s"/>

    <!-- ===== LABELS on lines ===== -->
    <!-- 윈카 ↔ 채널 -->
    <rect x="126" y="126" width="68" height="18" rx="9" fill="#fff" stroke="#1DB88E" stroke-width="0.5" class="label-bg"/>
    <text x="160" y="139" text-anchor="middle" class="label-text" fill="#0F6E56">운영 솔루션</text>
    <rect x="240" y="126" width="68" height="18" rx="9" fill="#fff" stroke="#D4910F" stroke-width="0.5" class="label-bg"/>
    <text x="274" y="139" text-anchor="middle" class="label-text" fill="#BA7517">회원 데이터</text>

    <!-- 윈카 ↔ 광고주 -->
    <rect x="502" y="126" width="68" height="18" rx="9" fill="#fff" stroke="#1DB88E" stroke-width="0.5" class="label-bg"/>
    <text x="536" y="139" text-anchor="middle" class="label-text" fill="#0F6E56">맞춤 솔루션</text>
    <rect x="398" y="126" width="85" height="18" rx="9" fill="#fff" stroke="#D4910F" stroke-width="0.5" class="label-bg"/>
    <text x="440" y="139" text-anchor="middle" class="label-text" fill="#BA7517">데이터 · 수익쉐어</text>

    <!-- 채널 ↔ 광고주 -->
    <rect x="300" y="244" width="110" height="18" rx="9" fill="#fff" stroke="#1DB88E" stroke-width="0.5" class="label-bg"/>
    <text x="355" y="257" text-anchor="middle" class="label-text" fill="#0F6E56">트래픽 · 회원 데이터</text>
    <rect x="300" y="278" width="110" height="18" rx="9" fill="#fff" stroke="#D4910F" stroke-width="0.5" class="label-bg"/>
    <text x="355" y="291" text-anchor="middle" class="label-text" fill="#BA7517">광고료 · 레베뉴쉐어</text>

    <!-- 채널 ↔ 유저 -->
    <rect x="96" y="348" width="106" height="18" rx="9" fill="#fff" stroke="#1DB88E" stroke-width="0.5" class="label-bg"/>
    <text x="149" y="361" text-anchor="middle" class="label-text" fill="#0F6E56">정보 · 서비스 · 혜택</text>
    <rect x="96" y="369" width="82" height="18" rx="9" fill="#fff" stroke="#D4910F" stroke-width="0.5" class="label-bg"/>
    <text x="137" y="382" text-anchor="middle" class="label-text" fill="#BA7517">트래픽 · 데이터</text>

    <!-- 광고주 ↔ 유저 -->
    <rect x="528" y="348" width="68" height="18" rx="9" fill="#fff" stroke="#1DB88E" stroke-width="0.5" class="label-bg"/>
    <text x="562" y="361" text-anchor="middle" class="label-text" fill="#0F6E56">배팅 서비스</text>
    <rect x="528" y="369" width="82" height="18" rx="9" fill="#fff" stroke="#D4910F" stroke-width="0.5" class="label-bg"/>
    <text x="569" y="382" text-anchor="middle" class="label-text" fill="#BA7517">수익 (배팅 이용)</text>

    <!-- ===== NODES ===== -->

    <!-- 윈카 / 7플레이 -->
    <g class="node-group" data-tip="핵심 모듈을 개발·개선하여\n채널에 운영 솔루션을,\n광고주에 나라별 맞춤 솔루션을 제공">
      <ellipse cx="360" cy="65" rx="4" ry="4" fill="url(#gPurple)" class="pulse-ring"/>
      <rect x="210" y="30" width="300" height="70" rx="14" fill="url(#gPurple)" opacity="0.12" class="node-shadow" transform="translate(3,3)"/>
      <rect x="210" y="30" width="300" height="70" rx="14" fill="#fff" stroke="#534AB7" stroke-width="1" class="node-card"/>
      <rect x="224" y="39" width="8" height="52" rx="4" fill="url(#gPurple)" opacity="0.8"/>
      <text x="248" y="56" class="th" fill="#3C3489" dominant-baseline="central">윈카 / 7플레이</text>
      <text x="248" y="78" class="ts" fill="#7B73D1" dominant-baseline="central">핵심 모듈 · B2B 솔루션 플랫폼</text>
      <rect x="420" y="43" width="75" height="20" rx="10" fill="#EEEDFE"/>
      <text x="457" y="54" text-anchor="middle" class="badge" fill="#534AB7" dominant-baseline="central">PLATFORM</text>
    </g>

    <!-- 채널 -->
    <g class="node-group" data-tip="픽브레인 · 빌리언클럽 · 비트코인게임\n유저에게 정보/서비스/혜택 제공\n유저의 트래픽·데이터를 수집">
      <ellipse cx="130" cy="245" rx="4" ry="4" fill="url(#gTeal)" class="pulse-ring"/>
      <rect x="23" y="193" width="210" height="140" rx="14" fill="url(#gTeal)" opacity="0.12" class="node-shadow" transform="translate(3,3)"/>
      <rect x="20" y="190" width="210" height="140" rx="14" fill="#fff" stroke="#0F6E56" stroke-width="1" class="node-card"/>
      <rect x="34" y="200" width="8" height="120" rx="4" fill="url(#gTeal)" opacity="0.8"/>
      <text x="58" y="217" class="th" fill="#085041" dominant-baseline="central">채널</text>
      <rect x="96" y="207" width="58" height="20" rx="10" fill="#E1F5EE"/>
      <text x="125" y="218" text-anchor="middle" class="badge" fill="#0F6E56" dominant-baseline="central">MEDIA</text>
      <text x="58" y="248" class="ts" fill="#0F6E56" dominant-baseline="central">픽브레인</text>
      <text x="58" y="270" class="ts" fill="#0F6E56" dominant-baseline="central">빌리언클럽</text>
      <text x="58" y="292" class="ts" fill="#0F6E56" dominant-baseline="central">비트코인게임</text>
    </g>

    <!-- 광고주 (= 그레이마켓 운영자) -->
    <g class="node-group" data-tip="그레이마켓 운영자 = 광고주\n채널에 광고료/레베뉴쉐어 지급\n유저에게 배팅 서비스 제공\n윈카에 데이터·수익쉐어 지불">
      <ellipse cx="590" cy="245" rx="4" ry="4" fill="url(#gCoral)" class="pulse-ring"/>
      <rect x="493" y="193" width="210" height="140" rx="14" fill="url(#gCoral)" opacity="0.12" class="node-shadow" transform="translate(3,3)"/>
      <rect x="490" y="190" width="210" height="140" rx="14" fill="#fff" stroke="#C04A24" stroke-width="1" class="node-card"/>
      <rect x="504" y="200" width="8" height="120" rx="4" fill="url(#gCoral)" opacity="0.8"/>
      <text x="528" y="217" class="th" fill="#712B13" dominant-baseline="central">광고주 (운영자)</text>
      <rect x="528" y="238" width="120" height="20" rx="10" fill="#FAECE7"/>
      <text x="588" y="249" text-anchor="middle" class="badge" fill="#993C1D" dominant-baseline="central">= GRAY MKT OP</text>
      <text x="528" y="272" class="ts" fill="#993C1D" dominant-baseline="central">배팅서비스 사업자</text>
      <text x="528" y="294" class="ts" fill="#993C1D" dominant-baseline="central">나라별 시장 운영</text>
    </g>

    <!-- 유저 -->
    <g class="node-group" data-tip="서비스의 최종 소비자\n채널에 트래픽·데이터 제공\n광고주에 배팅 수익 제공">
      <ellipse cx="360" cy="440" rx="4" ry="4" fill="url(#gBlue)" class="pulse-ring"/>
      <rect x="213" y="413" width="300" height="70" rx="14" fill="url(#gBlue)" opacity="0.12" class="node-shadow" transform="translate(3,3)"/>
      <rect x="210" y="410" width="300" height="70" rx="14" fill="#fff" stroke="#185FA5" stroke-width="1" class="node-card"/>
      <rect x="224" y="419" width="8" height="52" rx="4" fill="url(#gBlue)" opacity="0.8"/>
      <text x="248" y="436" class="th" fill="#0C447C" dominant-baseline="central">유저</text>
      <text x="248" y="458" class="ts" fill="#3A7FCC" dominant-baseline="central">트래픽 · 데이터 · 수익 창출원</text>
      <rect x="420" y="423" width="75" height="20" rx="10" fill="#E6F1FB"/>
      <text x="457" y="434" text-anchor="middle" class="badge" fill="#185FA5" dominant-baseline="central">END USER</text>
    </g>

    <!-- ===== Center cycle icon ===== -->
    <g opacity="0.15">
      <circle cx="360" cy="266" r="28" fill="none" stroke="#555" stroke-width="1"/>
      <path d="M348 254 A16 16 0 0 1 372 254" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrG)"/>
      <path d="M372 278 A16 16 0 0 1 348 278" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrA)"/>
    </g>
    <text x="360" y="270" text-anchor="middle" font-size="8" fill="#aaa" dominant-baseline="central">VALUE</text>
    <text x="360" y="280" text-anchor="middle" font-size="8" fill="#aaa" dominant-baseline="central">CYCLE</text>

  </svg>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background: linear-gradient(90deg, #1DB88E, #0F6E56)"></div>
      서비스 · 솔루션 흐름
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: linear-gradient(90deg, #D4910F, #BA7517)"></div>
      데이터 · 수익 흐름
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
  // Tooltip
  const tip = document.getElementById('tooltip');
  document.querySelectorAll('.node-group').forEach(g => {
    g.addEventListener('mouseenter', e => {
      const text = g.dataset.tip;
      if (!text) return;
      tip.innerHTML = text.replace(/\\n/g, '<br>');
      tip.classList.add('show');
    });
    g.addEventListener('mousemove', e => {
      tip.style.left = e.clientX + 14 + 'px';
      tip.style.top = e.clientY - 10 + 'px';
    });
    g.addEventListener('mouseleave', () => {
      tip.classList.remove('show');
    });
  });
</script>
</body>
</html>
